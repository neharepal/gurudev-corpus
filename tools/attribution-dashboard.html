<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gurudev Corpus — Attribution Dashboard</title>
<style>
  :root {
    --bg: #fafafa;
    --bg-card: #ffffff;
    --text: #1a1a1a;
    --text-dim: #6b6b73;
    --text-faint: #9a9aa3;
    --border: #e4e4e8;
    --border-strong: #d4d4da;
    --accent: #3a6bd6;
    --accent-soft: #eef2fc;
    --status-pending: #c4c4cc;
    --status-done: #2da26a;
    --status-skip: #d59a2c;
    --status-defer: #8a5cd6;
    --status-edited: #3a6bd6;
    --row-hover: #f3f4f7;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, system-ui, "Noto Sans Devanagari", "Segoe UI", Roboto, sans-serif;
    font-size: 13.5px;
    line-height: 1.4;
  }
  header.top {
    position: sticky; top: 0; z-index: 30;
    background: rgba(255,255,255,0.94);
    backdrop-filter: saturate(140%) blur(8px);
    -webkit-backdrop-filter: saturate(140%) blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex; align-items: center; gap: 14px;
  }
  header.top h1 {
    font-size: 14px; font-weight: 600; margin: 0;
    letter-spacing: 0.1px;
  }
  header.top .progress {
    font-size: 12.5px; color: var(--text-dim);
    padding: 3px 9px;
    background: var(--accent-soft);
    border-radius: 12px;
    font-variant-numeric: tabular-nums;
  }
  header.top .spacer { flex: 1; }
  header.top button, header.top label.btn {
    font: inherit;
    font-size: 12.5px;
    padding: 5px 11px;
    background: #fff;
    color: var(--text);
    border: 1px solid var(--border-strong);
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  header.top button:hover, header.top label.btn:hover {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent);
  }
  header.top button.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  header.top button.primary:hover {
    background: #2d57b8;
    border-color: #2d57b8;
    color: #fff;
  }
  .filters {
    position: sticky; top: 41px; z-index: 25;
    background: rgba(250,250,250,0.96);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 6px 16px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .chip-row { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
  .chip-row .label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    margin-right: 4px;
  }
  .chip {
    font: inherit; font-size: 12px;
    padding: 3px 9px;
    border: 1px solid var(--border-strong);
    background: #fff;
    border-radius: 999px;
    cursor: pointer;
    color: var(--text-dim);
    transition: background 0.1s, border-color 0.1s, color 0.1s;
  }
  .chip:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
  .chip.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .chip .count {
    margin-left: 4px;
    font-variant-numeric: tabular-nums;
    opacity: 0.75;
    font-size: 11px;
  }
  .col-headers {
    position: sticky;
    top: 92px;
    z-index: 20;
    background: rgba(250,250,250,0.96);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 4px 26px 4px 28px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #888;
    font-weight: 600;
  }
  .col-headers .ch-name { flex: 1 1 auto; min-width: 140px; }
  .col-headers .ch-size {
    flex: 0 0 auto;
    text-align: right;
    padding-left: 6px;
    width: 56px;
    color: #aaa;
  }
  .col-headers .ch-fields {
    display: flex;
    gap: 5px;
    align-items: center;
    flex: 0 0 auto;
    justify-content: flex-end;
  }
  .col-headers .ch-action { width: 152px; }
  .col-headers .ch-author { width: 152px; }
  .col-headers .ch-work { width: 152px; }
  .col-headers .ch-lang { width: 70px; }
  .col-headers .ch-spacer { width: 62px; }
  .rows { padding: 8px 16px 80px; }
  .row {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 7px;
    margin-bottom: 6px;
    padding: 7px 10px 7px 12px;
    display: flex; align-items: center; gap: 8px;
    transition: background 0.12s, opacity 0.18s;
    position: relative;
  }
  .row:hover { background: var(--row-hover); }
  .row.done { opacity: 0.62; }
  .row.done:hover { opacity: 1; }
  .row .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--status-pending);
    flex: 0 0 auto;
    cursor: pointer;
    border: 1.5px solid #fff;
    box-shadow: 0 0 0 1px var(--border-strong);
    transition: background 0.15s, box-shadow 0.15s;
  }
  .row .dot:hover { box-shadow: 0 0 0 2px var(--accent); }
  .row[data-status="done"] .dot { background: var(--status-done); }
  .row[data-status="skipped"] .dot { background: var(--status-skip); }
  .row[data-status="deferred"] .dot { background: var(--status-defer); }
  .row[data-status="edited"] .dot { background: var(--status-edited); }
  .row .name-cell {
    flex: 1 1 auto;
    min-width: 140px;
    display: flex; align-items: center; gap: 6px;
    overflow: hidden;
  }
  .row .name-stack {
    display: flex;
    flex-direction: column;
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
  }
  .row .folder-path {
    font-size: 11px;
    color: #888;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.25;
    margin-top: 1px;
  }
  .row .bundle-badge {
    flex: 0 0 auto;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--accent);
    background: var(--accent-soft);
    border-radius: 4px;
    padding: 1px 6px;
    letter-spacing: 0.02em;
  }
  .row .name {
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1 1 auto;
    min-width: 0;
  }
  .row .size {
    flex: 0 0 auto;
    font-size: 11px;
    color: var(--text-faint);
    font-variant-numeric: tabular-nums;
    padding-left: 6px;
  }
  .row .fields {
    display: flex; gap: 5px; align-items: center;
    flex: 0 0 auto;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .row select, .row input[type="text"] {
    font: inherit; font-size: 12px;
    padding: 3px 6px;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    background: #fff;
    color: var(--text);
    height: 26px;
  }
  .row select:focus, .row input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }
  .row select.action { width: 152px; font-weight: 500; }
  .row select.author { width: 152px; }
  .row select.member { width: 152px; }
  .row select.language { width: 70px; }
  .row input.work { width: 168px; }
  .row input.narrator { width: 130px; }
  .row .icon-btn {
    font: inherit; font-size: 13px;
    padding: 3px 7px;
    height: 26px;
    background: #fff;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    cursor: pointer;
    color: var(--text-dim);
    transition: all 0.1s;
    line-height: 1;
  }
  .row .icon-btn:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-soft); }
  .row .confirm-btn { color: var(--status-done); }
  .row .confirm-btn:hover { background: #e7f5ee; border-color: var(--status-done); color: var(--status-done); }
  .row[data-status="done"] .confirm-btn { background: var(--status-done); color: #fff; border-color: var(--status-done); }
  .row-expansion {
    display: none;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 7px 7px;
    margin-top: -7px;
    margin-bottom: 6px;
    padding: 10px 14px 12px;
  }
  .row-expansion.open { display: block; }
  .row-expansion label {
    display: block;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-faint);
    margin-bottom: 3px;
  }
  .row-expansion textarea {
    font: inherit; font-size: 12.5px;
    width: 100%;
    min-height: 50px;
    padding: 6px 8px;
    border: 1px solid var(--border-strong);
    border-radius: 5px;
    background: #fff;
    color: var(--text);
    resize: vertical;
  }
  .row-expansion textarea:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-soft); }
  .row-expansion .meta {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-top: 8px;
  }
  .row-expansion .meta b { color: var(--text); font-weight: 600; }
  .row-expansion .files {
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--text-dim);
  }
  .row-expansion .files ol {
    margin: 4px 0 0; padding-left: 18px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 11px;
  }
  .row-expansion .files ol li { padding: 1px 0; word-break: break-all; }
  .row-expansion .show-more {
    display: inline-block;
    margin-top: 4px;
    color: var(--accent);
    font-size: 11.5px;
    cursor: pointer;
    background: none; border: none; padding: 0;
  }
  .row-expansion .show-more:hover { text-decoration: underline; }
  .empty {
    text-align: center;
    padding: 36px 16px;
    color: var(--text-faint);
    font-size: 13px;
  }
  .toast {
    position: fixed;
    bottom: 18px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 6px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 100;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  @media (max-width: 700px) {
    .row { flex-wrap: wrap; }
    .row .name-cell { flex-basis: 100%; min-width: 100%; }
    .row .fields { width: 100%; justify-content: flex-start; }
    .row select.action, .row select.author, .row select.member { width: 48%; }
    .row input.work { width: 48%; }
    .col-headers { display: none; }
  }
</style>
</head>

    <span class="ch-work">Work / Narrator</span>
    <span class="ch-lang">Lang</span>
    <span class="ch-spacer"></span>
  </span>
</div>

      dyn.appendChild(workIn);
      const langSel = makeSelect("language", LANGUAGES, dec.language, "language");
      langSel.addEventListener("change", () => { dec.language = langSel.value; onFieldChanged(entry.name); });
      dyn.appendChild(langSel);
    }
    // skip / defer => no extra fields
  }
  renderDyn();
  // Replace renderDyn on next field change so dynamic fields rebuild after action change
  actionSel.addEventListener("change", () => renderDyn());

  // expansion toggle
  const expandBtn = document.createElement("button");
  expandBtn.className = "icon-btn expand-btn";
  expandBtn.textContent = "…";
  expandBtn.title = "Notes" + (entry.is_bundle ? " & file list" : "");
  expandBtn.addEventListener("click", () => toggleExpansion(entry.name));
  fields.appendChild(expandBtn);

  // confirm
  const confirmBtn = document.createElement("button");
  confirmBtn.className = "icon-btn confirm-btn";
  confirmBtn.textContent = "✓";
  confirmBtn.title = "Confirm row";
  confirmBtn.addEventListener("click", () => confirmRow(entry.name));
  fields.appendChild(confirmBtn);

  row.appendChild(fields);

  // expansion container
  const exp = document.createElement("div");
  exp.className = "row-expansion";
  exp.dataset.expansionFor = entry.name;

  const notesLabel = document.createElement("label");
  notesLabel.textContent = "Notes";
  exp.appendChild(notesLabel);
  const notesArea = document.createElement("textarea");
  notesArea.value = dec.notes || "";
  notesArea.addEventListener("input", () => { dec.notes = notesArea.value; onFieldChanged(entry.name); });
  exp.appendChild(notesArea);

  const meta = document.createElement("div");
  meta.className = "meta";
  const g = entry.my_guess || {};
  meta.innerHTML = "<b>Confidence:</b> " + (g.confidence || "—");
  if (entry.folder) meta.innerHTML += "  &nbsp; <b>Folder:</b> " + escapeHtml(entry.folder);
  exp.appendChild(meta);

  if (entry.is_bundle && entry.files && entry.files.length) {
    const fl = document.createElement("div");
    fl.className = "files";
    const headLabel = document.createElement("label");
    headLabel.textContent = "Files in bundle (" + entry.files.length + ")";
    fl.appendChild(headLabel);
    const ol = document.createElement("ol");
    const initial = Math.min(10, entry.files.length);
    for (let i = 0; i < initial; i++) {
      const li = document.createElement("li");
      li.textContent = entry.files[i];
      ol.appendChild(li);
    }
    fl.appendChild(ol);
    if (entry.files.length > 10) {
      const more = document.createElement("button");
      more.className = "show-more";
      more.textContent = "+ " + (entry.files.length - 10) + " more";
      more.addEventListener("click", () => {
        for (let i = 10; i < entry.files.length; i++) {
          const li = document.createElement("li");
          li.textContent = entry.files[i];
          ol.appendChild(li);
        }
        more.remove();
      });
      fl.appendChild(more);
    }
    exp.appendChild(fl);
  }

  return { row, exp };
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
}

function onFieldChanged(name, fromAction) {
  const dec = STATE[name];
  // determine status: skip -> skipped, defer -> deferred, else edited unless confirmed
  if (dec.action === "skip") dec.status = "skipped";
  else if (dec.action === "defer") dec.status = "deferred";
  else if (dec.status !== "done") dec.status = "edited";
  else if (fromAction) dec.status = "edited"; // changing action away from done
  saveState();
  updateRowStatus(name);
  updateCounts();
}

function updateRowStatus(name) {
  const dec = STATE[name];
  const row = document.querySelector(`.row[data-name="${cssEscape(name)}"]`);
  if (row) {
    row.dataset.status = dec.status;
    row.dataset.action = dec.action;
    row.classList.toggle("done", dec.status === "done" || dec.status === "skipped" || dec.status === "deferred");
  }
  applyFilters();
}

function cssEscape(s) {
  // CSS attribute selector escaping for use inside `"..."`
  return s.replace(/\\/g, "\\\\").replace(/"/g, "\\\"");
}

function cycleStatus(name) {
  const dec = STATE[name];
  // dot click: pending/edited -> done; done -> pending
  if (dec.status === "done") {
    dec.status = "edited";
  } else {
    dec.status = "done";
  }
  saveState();
  updateRowStatus(name);
  updateCounts();
}

function confirmRow(name) {
  const dec = STATE[name];
  if (dec.action === "skip") dec.status = "skipped";
  else if (dec.action === "defer") dec.status = "deferred";
  else dec.status = "done";
  saveState();
  updateRowStatus(name);
  updateCounts();
  showToast("Confirmed: " + name);
}

function toggleExpansion(name) {
  const exp = document.querySelector(`.row-expansion[data-expansion-for="${cssEscape(name)}"]`);
  if (exp) exp.classList.toggle("open");
}

function updateCounts() {
  const counts = { all: 0, pending: 0, edited: 0, done: 0, skipped: 0, deferred: 0 };
  for (const entry of RAW_DATA) {
    const s = STATE[entry.name].status;
    counts.all++;
    counts[s] = (counts[s] || 0) + 1;
  }
  for (const k of Object.keys(counts)) {
    const el = document.getElementById("cnt-" + k);
    if (el) el.textContent = counts[k];
  }
  const decidedCount = counts.done + counts.skipped + counts.deferred;
  document.getElementById("progress").textContent = decidedCount + " / " + counts.all + " decided";
}

function applyFilters() {
  for (const entry of RAW_DATA) {
    const row = document.querySelector(`.row[data-name="${cssEscape(entry.name)}"]`);
    const exp = document.querySelector(`.row-expansion[data-expansion-for="${cssEscape(entry.name)}"]`);
    if (!row) continue;
    const dec = STATE[entry.name];
    const statusOk = activeStatusFilter === "all" || dec.status === activeStatusFilter;
    const actionOk = activeActionFilter === "all" || dec.action === activeActionFilter;
    const visible = statusOk && actionOk;
    row.style.display = visible ? "" : "none";
    if (exp) exp.style.display = visible ? (exp.classList.contains("open") ? "block" : "") : "none";
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove("show"), 1600);
}

function exportDecisions() {
  const out = { version: 2, saved_at: new Date().toISOString(), decisions: [] };
  for (const entry of RAW_DATA) {
    const dec = STATE[entry.name];
    if (!dec || dec.status === "pending") continue;
    const obj = {
      name: entry.name,
      is_bundle: !!entry.is_bundle,
      action: dec.action,
      author: dec.author,
      work_slug: dec.work_slug,
      language: dec.language,
      narrator: dec.narrator,
      about_member: dec.about_member,
      notes: dec.notes,
      status: dec.status
    };
    if (entry.is_bundle) obj.files = entry.files || [];
    else obj.path = entry.path || "";
    out.decisions.push(obj);
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const ymd = d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  a.href = url;
  a.download = "attribution-decisions-" + ymd + ".json";
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 500);
  showToast("Exported " + out.decisions.length + " decisions");
}

function importDecisions(file) {
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const parsed = JSON.parse(ev.target.result);
      const decisions = parsed.decisions || [];
      let merged = 0;
      for (const d of decisions) {
        if (!d.name || !STATE[d.name]) continue;
        const cur = STATE[d.name];
        for (const k of ["action","author","work_slug","language","narrator","about_member","notes","status"]) {
          if (d[k] !== undefined) cur[k] = d[k];
        }
        merged++;
      }
      saveState();
      renderAll();
      showToast("Imported " + merged + " decisions");
    } catch (e) {
      showToast("Import failed: " + e.message);
    }
  };
  reader.readAsText(file);
}

function confirmAllVisible() {
  let n = 0;
  for (const entry of RAW_DATA) {
    const row = document.querySelector(`.row[data-name="${cssEscape(entry.name)}"]`);
    if (!row || row.style.display === "none") continue;
    const dec = STATE[entry.name];
    if (dec.status === "pending" || dec.status === "edited") {
      if (dec.action === "skip") dec.status = "skipped";
      else if (dec.action === "defer") dec.status = "deferred";
      else dec.status = "done";
      n++;
    }
  }
  saveState();
  renderAll();
  showToast("Confirmed " + n + " rows");
}

function renderAll() {
  const container = document.getElementById("rows");
  container.innerHTML = "";
  if (!RAW_DATA.length) {
    container.innerHTML = "<div class='empty'>No entries.</div>";
    return;
  }
  for (const entry of RAW_DATA) {
    const { row, exp } = renderRow(entry);
    container.appendChild(row);
    container.appendChild(exp);
  }
  updateCounts();
  applyFilters();
}

function attachFilterChips() {
  document.querySelectorAll(".chip[data-status-filter]").forEach(c => {
    c.addEventListener("click", () => {
      document.querySelectorAll(".chip[data-status-filter]").forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      activeStatusFilter = c.dataset.statusFilter;
      applyFilters();
    });
  });
  document.querySelectorAll(".chip[data-action-filter]").forEach(c => {
    c.addEventListener("click", () => {
      document.querySelectorAll(".chip[data-action-filter]").forEach(x => x.classList.remove("active"));
      c.classList.add("active");
      activeActionFilter = c.dataset.actionFilter;
      applyFilters();
    });
  });
}

document.getElementById("export-btn").addEventListener("click", exportDecisions);
document.getElementById("confirm-all-pending").addEventListener("click", confirmAllVisible);
document.getElementById("import-input").addEventListener("change", (e) => {
  const f = e.target.files && e.target.files[0];
  if (f) importDecisions(f);
  e.target.value = "";
});

attachFilterChips();
renderAll();
</script>
</body>
