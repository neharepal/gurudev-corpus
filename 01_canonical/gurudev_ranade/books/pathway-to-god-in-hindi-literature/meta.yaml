quality_notes: |
  Three-part work extracted from three separate DOCX sources, concatenated in order
  (Part 1, Part 2, Part 3 Dohas) under a single text.md with `## Part N` headings and
  `---` separators between parts. Mixed-script content (English narrative interleaved
  with Devanagari quotations from Hindi sant poetry, Marathi padas, and Sanskrit
  Upanishadic verses) was preserved verbatim by pandoc with no apparent corruption.
notes: |
  PGHL is the Hindi-literature companion volume to Pathway to God in Marathi
  Literature (PGML) and Pathway to God in Kannada Literature (PGKL). Companion
  source-book परमार्थसोपान (Paramarthasopan) contains the Padas and Dohas discussed
  here. First published 1954 per the front-matter; fourth edition 2013 is the
  source used for extraction. Year fields left blank pending verification of
  exact first-publication date.
