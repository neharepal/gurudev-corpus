# Work priority order — source of truth for the "which books matter most"
# question across features.
#
# Consumed by:
#   - query_understanding.extract_mentioned_work (ADR-018): the LLM
#     candidate list is restricted to `section_1_gurudev_literature` +
#     tiers below so nickname/paraphrase queries can't misroute to a
#     smruti-XXX tribute paper.
#   - retrieve.py chunk_tier weighting: higher-tier chunks get an additive
#     score bump so a Gurudev-own passage beats a smruti mention of the
#     same topic.
#   - RFC-018 citation-alias index: the `alias_originals` list is drawn
#     from Section 1 (and tier 2 primary works below).
#
# Source: Neha's authoritative list 2026-07-18
# (docs/books-reference-list-2026-07-18.md). Ordering within each section
# is PRIORITY order — item 1 is highest priority, not alphabetical.
#
# For each item: work_id when present in the corpus, `MISSING` when the
# book is on Neha's list but not yet ingested. The `MISSING` entries drive
# the future ingestion checklist.

# ─────────────────────────────────────────────────────────────────────────
